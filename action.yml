name: Statecraft PR review
description: >
  Request a Statecraft visual preview of the journeys touched by this PR.
  On PR open/synchronize, posts the PR's base/head SHAs to a Statecraft
  workspace (authenticated via a workspace API token with the
  `pr-review:run` scope), polls for the run to complete, and posts a
  sticky PR comment listing one preview link per affected journey.

  Trigger requirement: only the `pull_request` event is supported. We do
  NOT accept `pull_request_target` — that event exposes secrets to fork
  PRs while defaulting to a base-branch checkout, and is a common
  security footgun. See the project README for an example workflow.

inputs:
  statecraft-token:
    description: >
      Workspace API token (sck_…) with the `pr-review:run` scope. Mint one in
      the Statecraft workspace Settings → API tokens UI.
    required: true
  statecraft-base-url:
    description: >
      Convex site URL for the Statecraft deployment hosting the HTTP routes
      (e.g. https://acrid-stoat-123.convex.site). Defaults to production.
    required: false
    default: https://api.statecraftapp.com
  statecraft-web-origin:
    description: >
      Web origin used to construct preview links posted to the PR comment.
      Defaults to production.
    required: false
    default: https://statecraftapp.com
  scope:
    description: >
      Optional free-text hint passed to the survey agent to narrow which
      journeys it bothers enumerating. Example: "checkout flow".
    required: false
    default: ''
  design-system:
    description: >
      Design-system slug to render against. If omitted, the action reads
      a top-level `slug:` from your repo's `statecraft.yaml`. Either the
      input or the yaml must provide one — the action errors if neither
      is set. The slug must match a design system in the workspace your
      `statecraft-token` is scoped to.
    required: false
    default: ''
  poll-timeout-seconds:
    description: Max seconds to wait for the run to reach a terminal status.
    required: false
    default: '1800'
  poll-interval-seconds:
    description: Seconds between status polls.
    required: false
    default: '5'
  github-token:
    description: >
      GitHub token used to post the sticky PR comment. Defaults to the job's
      automatic GITHUB_TOKEN; supply a PAT only if you need to comment from a
      bot account.
    required: false
    default: ${{ github.token }}
  node-version:
    description: >
      Override the Node.js version installed on the runner. By default the
      action reads `.nvmrc`, then `package.json#engines.node`, falling back
      to `lts/*`. Pass an explicit value here if those heuristics misfire
      for your repo.
    required: false
    default: ''
  package-manager:
    description: >
      Override the package manager (pnpm | npm | yarn). By default the
      action reads `package.json#packageManager`, then falls back to
      lockfile detection. Pass an explicit value here if those heuristics
      misfire (e.g. monorepo with mixed PMs).
    required: false
    default: ''
  statecraft-cli-version:
    description: >
      Statecraft CLI version installed on the runner for the DS-build step.
      Defaults to `latest`. Pin a specific version (e.g. `2.1.3`) to lock
      against breaking CLI changes between action minor releases.
    required: false
    default: 'latest'

outputs:
  run-id:
    description: The prReviewRuns id created (or reused) for this PR.
    value: ${{ steps.run.outputs.run-id }}
  status:
    description: Terminal status of the run (done, failed, cancel_requested).
    value: ${{ steps.run.outputs.status }}
  preview-links-json:
    description: JSON array of {projectId, slug, journeyName, url} for each affected journey.
    value: ${{ steps.run.outputs.preview-links-json }}

runs:
  using: composite
  steps:
    # Check out the PR head — both for the slug lookup and (in v2) so the
    # runner can do `pnpm install` + `statecraft publish` against the
    # customer's exact PR-head source. We need full history for the
    # base...head diff, so fetch-depth=0; this is the only step where it
    # matters.
    - name: Check out PR head
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 0

    # Resolve which Node + package manager versions to set up so the
    # install on the runner matches the customer's own publish CI. We
    # deliberately mirror their setup (read `.nvmrc`, `packageManager`,
    # lockfile) rather than imposing ours — the point of v2 is to use the
    # customer's existing toolchain, not patch around its incompatibility
    # with ours.
    - name: Resolve toolchain versions
      id: tc
      shell: bash
      env:
        STATECRAFT_REPO_ROOT: ${{ github.workspace }}
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
        INPUT_PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: bash "$GITHUB_ACTION_PATH/scripts/resolve-toolchain.sh"

    # pnpm BEFORE node when the resolved PM is pnpm — `actions/setup-node`
    # with `cache: pnpm` requires pnpm to already be on PATH to compute the
    # cache key. v2.0.1 had these swapped and failed in 2s with
    # `Unable to locate executable file: pnpm`. Same order the customer's
    # own `publish.yml` uses (proves the pattern in the wild).
    - name: Setup pnpm
      if: steps.tc.outputs.pkg-manager == 'pnpm'
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.tc.outputs.pnpm-version }}

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.tc.outputs.node-version }}
        cache: ${{ steps.tc.outputs.pkg-manager }}

    - name: Install statecraft CLI
      shell: bash
      env:
        STATECRAFT_CLI_VERSION: ${{ inputs.statecraft-cli-version }}
      run: bash "$GITHUB_ACTION_PATH/scripts/install-cli.sh"

    - name: Run Statecraft PR review
      id: run
      shell: bash
      env:
        STATECRAFT_TOKEN: ${{ inputs.statecraft-token }}
        STATECRAFT_BASE_URL: ${{ inputs.statecraft-base-url }}
        STATECRAFT_WEB_ORIGIN: ${{ inputs.statecraft-web-origin }}
        STATECRAFT_SCOPE: ${{ inputs.scope }}
        STATECRAFT_DESIGN_SYSTEM: ${{ inputs.design-system }}
        STATECRAFT_POLL_TIMEOUT: ${{ inputs.poll-timeout-seconds }}
        STATECRAFT_POLL_INTERVAL: ${{ inputs.poll-interval-seconds }}
        GH_TOKEN: ${{ inputs.github-token }}
        # The composite action's working dir is the caller's checkout — but
        # passing the path explicitly makes the script robust to future
        # callers who might run it from elsewhere.
        STATECRAFT_REPO_ROOT: ${{ github.workspace }}
        # Pass the resolved toolchain to run.sh so its install + publish
        # steps can shell out to the right binary.
        STATECRAFT_PKG_MANAGER: ${{ steps.tc.outputs.pkg-manager }}
      run: bash "$GITHUB_ACTION_PATH/scripts/run.sh"
